<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Petshop Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-zinc-950 text-white flex"> <!-- SIDEBAR -->
    <aside class="w-64 min-h-screen bg-zinc-900 border-r border-white/10 p-6">
        <h1 class="text-2xl font-bold mb-8 text-emerald-400">PetControl</h1>
        <nav class="space-y-4 text-zinc-400">
            <p class="text-white">Categorias</p>
            <p class="hover:text-white cursor-pointer">Produtos</p>
        </nav>
    </aside> <!-- MAIN -->
    <main class="flex-1 p-10"> <!-- HEADER -->
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-3xl font-bold">Categorias</h2> <button onclick="abrirModal()"
                class="bg-emerald-500 px-5 py-2 rounded-xl hover:scale-105 transition"> + Nova Categoria </button>
        </div> <!-- GRID DE CATEGORIAS -->
        <div id="listaCategorias" class="grid md:grid-cols-3 gap-6"> <!-- cards entram aqui --> </div>
    </main> <!-- MODAL -->
    <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">
        <div class="bg-zinc-900 p-8 rounded-2xl w-full max-w-md">
            <h3 class="text-xl font-bold mb-4">Nova Categoria</h3> <input id="nomeCategoria" type="text"
                placeholder="Nome da categoria" class="w-full p-3 mb-4 rounded-lg bg-zinc-800 border border-zinc-700">
            <div class="flex justify-end gap-4"> <button onclick="fecharModal()" class="text-zinc-400">Cancelar</button>
                <button onclick="salvarCategoria()" class="bg-emerald-500 px-4 py-2 rounded-lg hover:bg-emerald-600">
                    Salvar </button> </div>
        </div>
    </div>
</body>
</html>
