<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Document</title>
</head>
<header>
    <h3> Página Cadastro</h3>
    <div class="headerRight">
        <a href="login2.html">
            <h3> Log-in</h3>
        </a>
    </div>
</header>

<body>
    <div class=superbox>

        <div class=genericContainer>
            <h2> Registrar</h2>
            <br>
            <form id="registroForm">
                <input placeholder="Nome" id="nome" type="text">
                <input placeholder="E-mail" id="email" type="text">
                <input placeholder="Senha" id="senha" type="text">
                <input placeholder="Perfil" id="perfil" type="text">
                <input placeholder="Endereco" id="endereco" type="text">
                <input placeholder="Bairro" id="bairro" type="text">
                <input placeholder="Complemento" id="complemento" type="text">
                <input placeholder="Cep" id="cep" type="text">
                <input placeholder="Cidade" id="cidade" type="text">
                <input placeholder="Estado" id="estado" type="text">
                <div class="fotoContainer">
                    <label for="foto">Foto de perfil</label>
                    <input type="file" id="foto" accept="image/*">
                    <img id="preview" class="previewFoto" src="" alt="">
                </div>

                <button id="submit" type="submit">Submit</button>

                <p id="resultado"></p>
                <p id="erro"></p>
            </form>
        </div>
    </div>

    <footer></footer>
</body>
<script src="js/app.js"></script>

</html>
