<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Nova Senha</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        h2 { text-align: center; color: #1f2937; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #4338ca; }
        #mensagem { margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Criar Nova Senha</h2>
    <p id="infoEmail" style="text-align: center; color: #6b7280; font-size: 14px;"></p>

    <form id="redefinirForm">
        <div class="form-group">
            <label>Nova Senha</label>
            <input type="password" id="novaSenha" required minlength="4">
        </div>
        <div class="form-group">
            <label>Confirmar Senha</label>
            <input type="password" id="confirmarSenha" required>
        </div>
        <button type="submit">Atualizar Senha</button>
    </form>
    <div id="mensagem"></div>
</div>

<script>
    // 1. Pega o e-mail da URL (ex: ?email=teste@email.com)
    const urlParams = new URLSearchParams(window.location.search);
    const emailUsuario = urlParams.get('email');
    
    if (emailUsuario) {
        document.getElementById('infoEmail').innerText = `Redefinindo para: ${emailUsuario}`;
    } else {
        alert("E-mail não identificado na URL!");
    }

    const form = document.getElementById('redefinirForm');
    const mensagem = document.getElementById('mensagem');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const novaSenha = document.getElementById('novaSenha').value;
        const confirmarSenha = document.getElementById('confirmarSenha').value;

        // Validação simples de confirmação
        if (novaSenha !== confirmarSenha) {
            mensagem.innerHTML = '<span style="color: red;">As senhas não coincidem!</span>';
            return;
        }

        try {
            // 2. Envia para o endpoint que criamos no Java
            const response = await fetch('http://localhost:8080/usuarios/redefinir-senha', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    email: emailUsuario, 
                    novaSenha: novaSenha 
                })
            });

            if (response.ok) {
                mensagem.innerHTML = '<span style="color: green;">Senha alterada com sucesso! Redirecionando...</span>';
                setTimeout(() => {
                    window.location.href = 'login.html'; // Mude para o nome da sua tela de login
                }, 2000);
            } else {
                throw new Error();
            }
        } catch (err) {
            mensagem.innerHTML = '<span style="color: red;">Erro ao atualizar senha.</span>';
        }
    });
</script>

</body>
</html>
